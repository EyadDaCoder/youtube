<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Education Player</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 800px; text-align: center; }
        input { width: 60%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        button { padding: 12px 24px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #218838; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin-top: 25px; background: #000; border-radius: 10px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <h1>YouTube Education Embed</h1>
        <p>Paste a YouTube Video ID to play it ad-free.</p>
        <input type="text" id="vidInput" placeholder="Ex: yfN4h1OL1Ew">
        <button onclick="playVideo()">Play Video</button>

        <div class="video-container" id="player">
            <!-- Video will load here -->
        </div>
    </div>

    <script>
        function playVideo() {
            const videoId = document.getElementById('vidInput').value.trim();
            if (videoId) {
                const player = document.getElementById('player');
                // Uses the youtubeeducation.com domain for ad-free embedding
                player.innerHTML = `<iframe src="https://www.youtubeeducation.com/embed/${videoId}?rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            } else {
                alert("Please enter a Video ID!");
            }
        }
    </script>

</body>
</html>
