<!DOCTYPE html>
<html>
<head>
    <title>Educational Video Portal</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #111; color: white; padding: 50px; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #e67e22; color: white; border: none; border-radius: 5px; }
        iframe { width: 80%; height: 500px; margin-top: 20px; border: 2px solid #333; }
        select { padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Edu-Video Gateway</h1>
    <p>Enter a YouTube Video ID and choose a server:</p>
    
    <select id="instance">
        <option value="https://yewtu.be">yewtu.be</option>
        <option value="https://nadeko.net">inv.nadeko.net</option>
        <option value="https://flokinet.to">invidious.flokinet.to</option>
    </select>
    
    <input type="text" id="videoId" placeholder="Video ID (e.g. dQw4w9WgXcQ)">
    <button onclick="loadVideo()">Watch</button>

    <div id="playerArea"></div>

    <script>
        function loadVideo() {
            const id = document.getElementById('videoId').value;
            const base = document.getElementById('instance').value;
            if(id) {
                document.getElementById('playerArea').innerHTML = 
                    `<iframe src="${base}/embed/${id}" allowfullscreen></iframe>`;
            }
        }
    </script>
</body>
</html>
